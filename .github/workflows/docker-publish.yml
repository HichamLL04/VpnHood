name: Build & Push Docker Image — VpnHood Server

on:
  # Trigger on every release (stable and pre-release)
  release:
    types: [published]

  # Allow manual runs with optional version override
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (defaults to PubVersion.json)"
        required: false
        default: ""
      push:
        description: "Push image to registry?"
        type: boolean
        required: false
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vpnhood-server

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve version tag ───────────────────────────────
      - name: Resolve image version
        id: version
        run: |
          # Priority: manual input > release tag > PubVersion.json
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
            echo "Source: manual input"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "Source: release tag"
          else
            VERSION=$(jq -r '.Version' Pub/PubVersion.json)
            echo "Source: PubVersion.json"
          fi

          # Strip leading 'v' if present, then also export bare semver
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          echo "VERSION=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "MAJOR=$MAJOR"         >> "$GITHUB_OUTPUT"
          echo "MINOR=$MINOR"         >> "$GITHUB_OUTPUT"

          # Is this a pre-release?
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          echo "IS_PRERELEASE=${IS_PRERELEASE:-false}" >> "$GITHUB_OUTPUT"

      # ── 3. Set up QEMU (multi-arch builds) ───────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 4. Set up Docker Buildx ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Log in to GHCR ────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Extract Docker metadata / tags ────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver:  7.6.783
            type=raw,value=${{ steps.version.outputs.VERSION }}
            # Minor:        7.6
            type=raw,value=${{ steps.version.outputs.MINOR }}
            # Major:        7
            type=raw,value=${{ steps.version.outputs.MAJOR }}
            # "latest" only for stable releases
            type=raw,value=latest,enable=${{ steps.version.outputs.IS_PRERELEASE == 'false' }}
            # "prerelease" tag for pre-releases
            type=raw,value=prerelease,enable=${{ steps.version.outputs.IS_PRERELEASE == 'true' }}
          labels: |
            org.opencontainers.image.title=VpnHood Server
            org.opencontainers.image.description=VpnHood VPN Server (net10.0 / Linux)
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.licenses=LGPL-2.1-only

      # ── 7. Build (and push) ──────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'release' || inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args available in the Dockerfile if needed
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}

      # ── 8. Summary ───────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## Docker image published 🐳" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | \`${{ steps.version.outputs.IS_PRERELEASE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platforms | \`linux/amd64\`, \`linux/arm64\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Tags pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
