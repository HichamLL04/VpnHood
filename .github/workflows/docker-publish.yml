name: Build & Push Docker Image — VpnHood Server

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (defaults to PubVersion.json)"
        required: false
        default: ""
      push:
        description: "Push image to registry?"
        type: boolean
        required: false
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vpnhood-server

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve version tag ───────────────────────────────
      - name: Resolve image version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
            echo "Source: manual input"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "Source: release tag"
          else
            VERSION=$(jq -r '.Version' Pub/PubVersion.json)
            echo "Source: PubVersion.json"
          fi

          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          echo "VERSION=$VERSION"               >> "$GITHUB_OUTPUT"
          echo "MAJOR=$MAJOR"                   >> "$GITHUB_OUTPUT"
          echo "MINOR=$MINOR"                   >> "$GITHUB_OUTPUT"

          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          echo "IS_PRERELEASE=${IS_PRERELEASE:-false}" >> "$GITHUB_OUTPUT"

      # ── 3. Set up QEMU ───────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 4. Set up Docker Buildx ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Log in to GHCR ────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Extract Docker metadata / tags ────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=${{ steps.version.outputs.MINOR }}
            type=raw,value=${{ steps.version.outputs.MAJOR }}
            type=raw,value=latest,enable=${{ steps.version.outputs.IS_PRERELEASE == 'false' }}
            type=raw,value=prerelease,enable=${{ steps.version.outputs.IS_PRERELEASE == 'true' }}
          labels: |
            org.opencontainers.image.title=VpnHood Server
            org.opencontainers.image.description=VpnHood VPN Server (net10.0 / Linux)
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.licenses=LGPL-2.1-only

      # ── 7. Build and push ────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        env:
          BUILDX_PROGRESS: plain
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'release' || inputs.push == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}

      # ── 8. Full logs on failure ───────────────────────────────
      - name: Collect build logs on failure
        if: failure()
        run: |
          echo "::group::Re-running linux/amd64 with full output (no cache)"
          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile \
            --progress plain \
            --build-arg BUILD_VERSION=${{ steps.version.outputs.VERSION }} \
            --no-cache \
            . 2>&1 | tee /tmp/docker-build-amd64.log || true
          echo "::endgroup::"
        continue-on-error: true

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-logs-${{ github.run_id }}
          path: /tmp/docker-build-*.log
          retention-days: 7

      # ── 9. Summary ───────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## Docker image published 🐳" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | \`${{ steps.version.outputs.IS_PRERELEASE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platforms | \`linux/amd64\`, \`linux/arm64\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Tags pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
